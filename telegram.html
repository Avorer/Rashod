<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MAZAFAKERS | Лидерборд</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Audiowide&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/telegram.css?v=2">
</head>
<body>
    <div class="container">
        <div class="content-wrapper">
            <h1>🏆 MAZAFAKERS</h1>
            <p class="subtitle">ЛИДЕРБОРД</p>

            <div class="track-selector">
                <button class="track-btn active" data-track="ivanovskoe">ИВАНОВСКОЕ</button>
                <button class="track-btn" data-track="glubokoe">ГЛУБОКОЕ</button>
                <button class="track-btn" data-track="raifa">ДЕНДРАРИЙ</button>
            </div>

            <div class="direction-selector">
                <button class="direction-btn active" data-direction="forward">ВПЕРЕД</button>
                <button class="direction-btn reverse" data-direction="reverse">РЕВЕРС</button>
            </div>

            <div class="header-info">
                <span>👥 <span id="total-drivers">0</span></span>
                <span>📍 <span id="current-direction-text">ВПЕРЕД</span></span>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>ГОНЩИК</th>
                            <th>ВРЕМЯ</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                    </tbody>
                </table>
            </div>

            <div class="track-info">
                <div class="track-info-item">🏁 <span id="track-length">—</span></div>
                <div class="track-info-item">↩️ <span id="track-turns">—</span></div>
                <div class="track-info-item">⏱️ <span id="track-record">—</span></div>
            </div>

            <div class="footer">MAZAFAKERS © 2025-2026</div>
        </div>
    </div>

    <script src="Js/telegram.js?v=2"></script>
</body>
</html>
